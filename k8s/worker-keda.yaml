apiVersion: v1
kind: Namespace
metadata:
  name: minishop
---
apiVersion: v1
kind: Secret
metadata:
  name: minishop-secrets
  namespace: minishop
type: Opaque
stringData:
  REDIS_URL: "redis://redis.minishop.svc.cluster.local:6379"
  KAFKA_BROKER: "kafka.minishop.svc.cluster.local:9092"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: minishop-config
  namespace: minishop
data:
  NODE_ENV: "production"
  IDEMPOTENCY_PREFIX: "minishop:worker:idem:"
  IDEMPOTENCY_TTL_MS: "900000"
  METRICS_PORT: "9100"
  KAFKA_FROM_BEGINNING: "false"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: minishop
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/SEU_USUARIO/minishop-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: minishop-config
            - secretRef:
                name: minishop-secrets
          ports:
            - name: metrics
              containerPort: 9100
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: worker-metrics
  namespace: minishop
  labels:
    app: worker
spec:
  selector:
    app: worker
  ports:
    - name: metrics
      port: 9100
      targetPort: metrics
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-kafka-lag
  namespace: minishop
spec:
  scaleTargetRef:
    name: worker
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 3
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka.minishop.svc.cluster.local:9092
        consumerGroup: minishop-worker-group
        topic: orders.created
        lagThreshold: "50"
        activationLagThreshold: "5"